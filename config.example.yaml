feishu:
  app_id: cli_xxx
  app_secret: xxx
  bot_name: Claude

auth:
  allowed_users:
    - ou_xxx

claude:
  cli_path: claude
  max_turns: 50
  approved_directory: /Users/you/projects

# 群聊响应模式配置
chat_modes:
  default: "mention"   # 全局默认: "mention"(仅@才回复) 或 "open"(看到所有消息)

# 指定群聊的覆盖配置（优先级高于全局 default）
# chat_overrides:
#   "oc_xxxx群IDxxxx":
#     chat_mode: "open"   # 让这个群走 open 模式
#     project_path: /custom/path   # 可选: 这个群专属的项目目录

proactive:
  enabled: true           # 主动推送功能开关
  time_window_start: "08:00"              # 可推送时间窗口开始（本地时间 HH:MM）
  time_window_end: "22:00"                # 可推送时间窗口结束
  silence_threshold_minutes: 90           # 沉默超过此分钟数后触发推送
  check_interval_minutes: 5               # 检查间隔
  max_per_day: 3                          # 每天最多推送次数，0 表示不限
  cooldown_minutes: 60                   # 发完一条后，同会话冷却分钟数，期间不再触发

storage:
  db_path: ./data/sessions.db

server:
  host: 0.0.0.0
  port: 8080
  webhook_path: /feishu/webhook
