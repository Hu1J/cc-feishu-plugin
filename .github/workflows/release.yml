name: Release (CLI Binaries)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # --- Platform binaries (CLI executables) ---
  build-binaries:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-14
            arch: arm64
            ext: ""
          - platform: macos-x86_64
            runner: macos-latest
            arch: x86_64
            ext: ""
          - platform: windows-x86_64
            runner: windows-2022
            arch: x86_64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build binary (${{ matrix.platform }})
        run: python build_cli.py

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "windows-x86_64" ]; then
            mv dist/cc-feishu-bridge.exe "dist/cc-feishu-bridge-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}"
          else
            mv dist/cc-feishu-bridge "dist/cc-feishu-bridge-${{ matrix.platform }}-${{ matrix.arch }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-feishu-bridge-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 30

  # --- Create GitHub Release ---
  release:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: cc-feishu-bridge-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: CHANGELOG.md
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
