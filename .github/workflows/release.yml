name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Build binary
        run: python build_nuitka.py --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-feishu-bridge-${{ matrix.platform }}
          path: dist/cc-feishu-bridge
          retention-days: 30

  release:
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cc-feishu-bridge-macos-arm64
          path: dist/

      - name: Make binary executable
        run: chmod +x dist/cc-feishu-bridge

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cc-feishu-bridge
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
