name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # --- Platform binaries (CLI executables) ---
  build-binaries:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            runner: macos-14
            arch: arm64
            ext: ""
          - platform: macos-x86_64
            runner: macos-13
            arch: x86_64
            ext: ""
          - platform: windows-x86_64
            runner: windows-2022
            arch: x86_64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build binary (${{ matrix.platform }})
        run: python build.py

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "windows-x86_64" ]; then
            mv dist/cc-feishu-bridge.exe "dist/cc-feishu-bridge-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}"
          else
            mv dist/cc-feishu-bridge "dist/cc-feishu-bridge-${{ matrix.platform }}-${{ matrix.arch }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-feishu-bridge-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 30

  # --- Python wheel (whl) ---
  build-whl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build whl
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-feishu-bridge-whl
          path: dist/*.whl
          retention-days: 30

  # --- Publish whl to PyPI via Trusted Publishing ---
  publish-whl:
    needs: [build-whl]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download whl artifact
        uses: actions/download-artifact@v4
        with:
          name: cc-feishu-bridge-whl
          path: dist/
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # --- Create GitHub Release ---
  release:
    needs: [build-binaries, build-whl]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: cc-feishu-bridge-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
